services:

  # ── Aplicación Laravel ───────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: panda_app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      TZ: America/La_Paz
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - panda_network
    depends_on:
      - mysql

  # ── Servidor Web Nginx ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: panda_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - panda_network
    depends_on:
      - app

  # ── Base de Datos MySQL ──────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: panda_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: proyectoprueba
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: panda
      MYSQL_PASSWORD: secret
      TZ: America/La_Paz
    ports:
      - "3307:3306"
    volumes:
      - panda_mysql_data:/var/lib/mysql
    networks:
      - panda_network

  # ── phpMyAdmin (gestor visual de BD) ────────────────────
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: panda_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: secret
    networks:
      - panda_network
    depends_on:
      - mysql

# ── Volúmenes y Red ─────────────────────────────────────────
volumes:
  panda_mysql_data:

networks:
  panda_network:
    driver: bridge